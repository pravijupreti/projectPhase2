name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    
    - name: Install PyInstaller
      run: |
        pip install pyinstaller
    
    - name: Build with PyInstaller
      run: |
        py -3.13 -m PyInstaller --onefile --clean --name ProjectControl1 --add-data "Windows;Windows" app.py
    
    - name: Download Inno Setup
      run: |
        curl -L -o innosetup.exe https://jrsoftware.org/download.php/is.exe
        .\innosetup.exe /VERYSILENT /SUPPRESSMSGBOXES /NORESTART
    
    - name: Compile Inno Setup Script
      run: |
        & "C:\Program Files (x86)\Inno Setup 6\iscc.exe" setup.iss
    
    - name: Auto-create version tag
      id: create_tag
      shell: pwsh
      run: |
        # Get the latest tag or start at v1.0.0
        $latestTag = git describe --tags --abbrev=0 2>$null
        if (-not $latestTag) {
          $newVersion = "v1.0.0"
        } else {
          # Extract version number and increment
          $version = $latestTag -replace '^v', ''
          $parts = $version -split '\.'
          $major = [int]$parts[0]
          $minor = [int]$parts[1]
          $patch = [int]$parts[2]
          $patch++
          $newVersion = "v$major.$minor.$patch"
        }
        
        # Create and push tag
        git config user.email "actions@github.com"
        git config user.name "GitHub Actions"
        git tag $newVersion
        git push origin $newVersion
        
        echo "NEW_TAG=$newVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        echo "Created tag: $newVersion"
    
    - name: Upload to GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          Output/mysetup.exe
          dist/ProjectControl1.exe
        generate_release_notes: true
        name: Release ${{ env.NEW_TAG }}
        tag_name: ${{ env.NEW_TAG }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}